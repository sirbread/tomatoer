<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tomato throw overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>tomatoer</h1>
        <h2 class="subtitle">throw tomatoes at stuff</h2>
        
        <div id="step1" class="panel active-step">
            <h2>1. upload an image</h2>
            <div id="dropzone" class="dropzone">
                <p>drag and drop or upload image...</p>
                <input type="file" id="imageUpload" accept="image/png, image/jpeg, image/jpg" class="hidden-input">
            </div>
        </div>

        <div id="step2" class="panel hidden">
            <h2>2. crop</h2>
            <div class="img-container">
                <img id="imageToCrop" src="" alt="crop me">
            </div>
            <div class="button-group">
                <button id="cancelUploadBtn" class="secondary-btn">nvm, go back</button>
                <button id="confirmCropBtn">yeah thats good</button>
            </div>
        </div>

        <div id="step3" class="panel hidden">
            <h2>3. aim and tweak</h2>
            <p id="targetHelpText">click the image to place the target throw</p>

            <div class="controls-row single-control-row">
                <div class="control-box">
                    <label>throws:</label>
                    <div class="mode-row">
                        <button id="singleModeBtn" type="button" class="mode-btn active">1 tomato</button>
                        <button id="multiModeBtn" type="button" class="mode-btn">more than 1</button>
                    </div>
                    <div id="multiOptions" class="hidden">
                        <label for="multiTypeSelect">multi throw type:</label>
                        <select id="multiTypeSelect">
                            <option value="synced">synced</option>
                            <option value="live">live</option>
                        </select>
                        <button id="clearThrowsBtn" type="button" class="secondary-btn clear-btn hidden">clear throws</button>
                    </div>
                </div>
            </div>
            
            <div class="controls-row">
                <div class="control-box">
                    <label for="speedSlider">speed: <span id="speedValue">1x</span></label>
                    <input type="range" id="speedSlider" min="0.25" max="10" step="0.25" value="1">
                </div>
                <div class="control-box">
                    <label for="zoomSlider">size: <span id="zoomValue">1x</span></label>
                    <input type="range" id="zoomSlider" min="0.25" max="5" step="0.25" value="1">
                </div>
            </div>

            <div class="target-container" id="targetContainer">
                <img id="targetImage" src="" alt="target area">
                <div id="targetMarker" class="target-marker"></div>
                <div id="throwMarkers" class="throw-markers"></div>
            </div>

            <div class="button-group">
                <button id="backToCropBtn" class="secondary-btn">wait go back</button>
                <button id="processBtn">tomato!</button>
            </div>
        </div>

        <div id="step4" class="panel hidden">
            <h2>4. tomatoerd</h2>
            
            <div id="loading" class="hidden">
                <img class="spinner" src="spin.gif" alt="loading">
                <p>one sec</p>
            </div>

            <div id="resultContainer" class="hidden">
                <img id="outputPreview" alt="final output">
                <div class="button-group">
                    <button id="startOverBtn" class="secondary-btn">run it back</button>
                    <a id="downloadBtn" class="button" download="tomatoerd.gif">save gif</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <script src="assets/ffmpeg.js"></script>
    <script src="assets/util.js"></script>
    <script src="script.js"></script>
</body>
</html>
