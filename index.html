<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomato Throw Overlay</title>
    <!-- Cropper.js CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tomato Throw Overlay Generator</h1>
        
        <div class="control-panel">
            <div class="step">
                <h3>1. Upload Image</h3>
                <input type="file" id="imageUpload" accept="image/png, image/jpeg, image/jpg">
            </div>

            <div class="step">
                <h3>2. Controls</h3>
                <label for="speedSlider">Speed: <span id="speedValue">1x</span></label>
                <input type="range" id="speedSlider" min="0.25" max="10" step="0.25" value="1">
                <br><br>
                <label for="zoomSlider">Tomato Size: <span id="zoomValue">1x</span></label>
                <input type="range" id="zoomSlider" min="0.25" max="5" step="0.25" value="1">
            </div>
        </div>

        <div class="workspace">
            <!-- Step 1: Cropping -->
            <div class="editor" id="cropSection">
                <h3>3. Crop Workspace</h3>
                <div class="img-container">
                    <img id="imageToCrop" src="" alt="Upload an image to start">
                </div>
                <button id="confirmCropBtn" disabled>Confirm Crop</button>
            </div>

            <!-- Step 2: Targeting -->
            <div class="editor hidden" id="targetSection">
                <h3>4. Click to Target!</h3>
                <p style="font-size: 14px; color: #aaa; margin-top: 0;">Click on the image to set where the tomato lands.</p>
                <div class="target-container" id="targetContainer">
                    <img id="targetImage" src="" alt="Cropped Result">
                    <div id="targetMarker" class="target-marker"></div>
                </div>
                <div style="display: flex; gap: 10px; width: 100%;">
                    <button id="backToCropBtn" style="background: #555;">Back to Crop</button>
                    <button id="processBtn">Process & Overlay</button>
                </div>
            </div>

            <!-- Step 3: Result -->
            <div class="result">
                <h3>Preview & Export</h3>
                <div id="loading" class="hidden">Processing with FFmpeg... Please wait.</div>
                <img id="outputPreview" class="hidden" alt="Final Output Preview">
                <a id="downloadBtn" class="button hidden" download="tomato-overlay.gif">Download GIF</a>
            </div>
        </div>
    </div>

    <!-- Cropper.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    
    <!-- 100% Local FFmpeg -->
    <script src="assets/ffmpeg.js"></script>
    <script src="assets/util.js"></script>
    
    <!-- Our Script -->
    <script src="script.js"></script>
</body>
</html>
